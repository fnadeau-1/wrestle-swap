<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Checkout - Fresh Roots Market</title>
        <link rel="stylesheet" href="checkout.css"> 
    </head>
    <body>
        <nav>
            <a href="index.html" class="logo">Fresh<span>Roots</span></a>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">Our Story</a></li>
              <li><a href="products.html">Shop</a></li>
              <li><a href="order.html">Order</a></li>
            </ul>
            <a href="order.html" class="nav-btn">🛒 Order</a>
        </nav>

            <form class="checkout-form" action="https://httpbin.org/post" method="POST">
                <h1>Checkout</h1>
                <div class="form-group"></div>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>   
                </div>
                <div class="form-group"></div>

                    <label for="address">Shipping Address</label>
                    <input type="text" id="address" name="address" required>
                    <input type="text" id="city" name="city" placeholder="City" required>
                    <input type="text" id="state" name="state" placeholder="State" required>
                    <input type="text" id="zip" name="zip" placeholder="ZIP Code" required>
                </div>
                <div class="form-group"></div>
                    <label for="payment">Payment Method</label>
                    <select id="payment" name="payment" required>
                        <option value="">Select a payment method</option>
                        <option value="credit_card">Credit Card</option>
                        <option value="paypal">PayPal</option>
                        <option value="apple_pay">Apple Pay</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Place Order</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='products.html'">Cancel</button>
            </form>
    </body>

</html>
