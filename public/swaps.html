<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Swaps | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/swaps.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-content">
            <div>
                <a href="profile.html">Profile</a>
                <a href="help.html">Help & Contact</a>
                <a href="messages.html">Chats</a>
            </div>
            <div>
                <a href="sell.html">Sell</a>
                <a href="watchlist.html">Watchlist</a>
                <a href="track.html">Track Packages</a>
            </div>
        </div>
    </div>

    <!-- Main Header -->
    <div class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo" aria-label="GrappleTrade home"></a>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Search for wrestling gear...">
                </div>
                <button class="search-btn">Search</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">My Swaps</h1>
            <p class="page-subtitle">Keep track of items you're interested in</p>
        </div>

        <!-- Watchlist Controls -->
        <div class="watchlist-controls">
            <div class="item-count" id="item-count">
                <strong>5 items</strong> in your swapping
            </div>
            <div class="sort-filter">
                <label>Sort by:</label>
                <select id="sort-select" onchange="sortWatchlist()">
                    <option value="Bought">Bought</option>
                    <option value="Sold">Sold</option>
                </select>
                <button class="clear-all-btn" onclick="clearWatchlist()">Clear All</button>
            </div>
        </div>

        <!-- Watchlist Items -->
        <div class="watchlist-grid" id="watchlist-container"></div>

        <!-- Empty State (hidden by default) -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <div class="empty-icon">👁️</div>
            <h2 class="empty-title">Your watchlist is empty</h2>
            <p class="empty-text">Start adding items you're interested in to keep track of them here</p>
            <button class="browse-btn" onclick="window.location.href='index.html'">Browse Items</button>
        </div>
    </div>

    <script>
        // Watchlist data array
        let watchlistItems = [
            {
                id: 1,
                title: "ASICS Matflex 6 Wrestling Shoes - Black/Silver - Size 10",
                condition: "Used - Excellent condition",
                price: 49.99,
                shipping: "Free shipping",
                seller: "wrestlingpro23",
                rating: 98.5,
                timeLeft: "2 days 5 hours",
                endTime: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000), // 2 days from now
                dateAdded: new Date('2024-01-20'),
                emoji: "👟"
            },
            {
                id: 2,
                title: "Adidas Wrestling Singlet - Red/Blue - Youth Large",
                condition: "New with tags",
                price: 35.00,
                shipping: "+$5.99 shipping",
                seller: "matgear4u",
                rating: 100,
                timeLeft: "5 hours",
                endTime: new Date(Date.now() + 5 * 60 * 60 * 1000), // 5 hours from now
                dateAdded: new Date('2024-01-25'),
                emoji: "🤼"
            },
            {
                id: 3,
                title: "Nike Team Warm-up Jacket & Pants Set - Adult Medium",
                condition: "Used - Like new",
                price: 65.00,
                shipping: "Free shipping",
                seller: "coachsmith",
                rating: 95.2,
                timeLeft: "1 day 12 hours",
                endTime: new Date(Date.now() + 1.5 * 24 * 60 * 60 * 1000), // 1.5 days from now
                dateAdded: new Date('2024-01-22'),
                emoji: "🧥"
            },
            {
                id: 4,
                title: "Rudis KS Elite Wrestling Shoes - Gray - Size 9.5",
                condition: "New without box",
                price: 95.00,
                shipping: "Free shipping",
                seller: "wrestlegearstore",
                rating: 99.8,
                timeLeft: "3 days",
                endTime: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000), // 3 days from now
                dateAdded: new Date('2024-01-18'),
                emoji: "👟"
            },
            {
                id: 5,
                title: "Wrestling Headgear & Knee Pads Bundle - Cliff Keen",
                condition: "Used - Good condition",
                price: 35.00,
                shipping: "+$6.99 shipping",
                seller: "teamgear88",
                rating: 97.1,
                timeLeft: "6 days 8 hours",
                endTime: new Date(Date.now() + 6.3 * 24 * 60 * 60 * 1000), // 6.3 days from now
                dateAdded: new Date('2024-01-15'),
                emoji: "🎽"
            }
        ];

        // Function to render watchlist items
        function renderWatchlist() {
            const container = document.getElementById('watchlist-container');
            
            if (watchlistItems.length === 0) {
                checkEmptyState();
                return;
            }
            
            container.innerHTML = watchlistItems.map(item => `
                <div class="watchlist-item" data-id="${item.id}">
                    <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
                    <div class="item-image">${item.emoji}</div>
                    <div class="item-details">
                        <div class="item-title">${item.title}</div>
                        <div class="item-condition">${item.condition}</div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                        <div class="item-shipping">${item.shipping}</div>
                        <div class="item-seller">Seller: ${item.seller} (${item.rating}% positive)</div>
                        <div class="item-time">Ends in ${item.timeLeft}</div>
                        <div class="item-actions">
                            <button class="action-btn buy-btn" onclick="buyItem(${item.id})">Buy It Now</button>
                            <button class="action-btn message-btn" onclick="messageItem(${item.id})">Message Seller</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateItemCount();
        }

        // Function to sort watchlist
        function sortWatchlist() {
            const sortType = document.getElementById('sort-select').value;
            
            switch(sortType) {
                case 'recent':
                    watchlistItems.sort((a, b) => b.dateAdded - a.dateAdded);
                    break;
                case 'price-low':
                    watchlistItems.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    watchlistItems.sort((a, b) => b.price - a.price);
                    break;
                case 'ending':
                    watchlistItems.sort((a, b) => a.endTime - b.endTime);
                    break;
                case 'title':
                    watchlistItems.sort((a, b) => a.title.localeCompare(b.title));
                    break;
            }
            
            renderWatchlist();
        }

        // Remove individual item
        function removeItem(id) {
            if (confirm('Remove this item from your watchlist?')) {
                watchlistItems = watchlistItems.filter(item => item.id !== id);
                renderWatchlist();
                checkEmptyState();
            }
        }

        // Clear all items
        function clearWatchlist() {
            if (confirm('Are you sure you want to clear your entire watchlist?')) {
                watchlistItems = [];
                renderWatchlist();
                checkEmptyState();
            }
        }

        // Update item count
        function updateItemCount() {
            const count = watchlistItems.length;
            const countElement = document.getElementById('item-count');
            countElement.innerHTML = `<strong>${count} ${count === 1 ? 'item' : 'items'}</strong> youre swapping`;
        }

        // Check if watchlist is empty and show empty state
        function checkEmptyState() {
            const emptyState = document.getElementById('empty-state');
            const controls = document.querySelector('.watchlist-controls');
            const container = document.getElementById('watchlist-container');
            
            if (watchlistItems.length === 0) {
                emptyState.style.display = 'block';
                controls.style.display = 'none';
                container.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                controls.style.display = 'flex';
                container.style.display = 'grid';
            }
        }

        // Buy item handler
        function buyItem(id) {
            window.location.href = 'index.html';
        }

        // Message seller handler
        function messageItem(id) {
            window.location.href = 'index.html';
        }

        // Initial render
        renderWatchlist();
    </script>
    <script type="module" src="js/site-notice.js"></script>
</body>
</html>
