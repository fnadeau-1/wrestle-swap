<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/messages.css">
    <script src="https://browser.sentry-cdn.com/8.38.0/bundle.min.js" integrity="sha256-facu3sz9OFAZ/KdtbGpCVb8abQC5VZJ4eSQSY0BGfW4=" crossorigin="anonymous"></script>
    <script src="js/sentry-init.js"></script>
    <script src="js/event-dispatch.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div>
                <span id="user-menu-wrapper">
                    <button class="top-bar-btn" data-href="sign-in.html">Hi! Sign in</button>
                </span>
                <button class="top-bar-btn" data-href="help.html">Help &amp; Contact</button>
                <button class="top-bar-btn" data-href="messages.html">Chats</button>
            </div>
            <div>
                <button class="top-bar-btn" data-href="sell.html">Sell</button>
                <button class="top-bar-btn" data-href="settings.html">Settings</button>
            </div>
        </div>
    </div>

    <div class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo" aria-label="GrappleTrade home"></a>
            <div class="search-container">
                <div class="search-box">
                    <input
                        type="text"
                        class="search-input"
                        id="search-input"
                        placeholder="Search for wrestling shoes, singlets, gear..."
                        aria-label="Search for wrestling gear"
                        data-onenter="performSearch"
                    >
                </div>
                <button class="search-btn" data-onclick="performSearch">Search</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar" aria-label="Main navigation">
        <div class="nav-content">
            <a href="watchlist.html">Saved</a>
            <a href="messages.html" style="color:#3665f3;font-weight:600;">Messages</a>
            <a href="search.html">All Categories</a>
            <a href="search.html?q=shoes">Wrestling Shoes</a>
            <a href="search.html?q=singlet">Singlets</a>
            <a href="search.html?q=shirt">Shirts</a>
            <a href="search.html?q=shorts">Shorts</a>
        </div>
    </nav>

    <main class="chat-container">
        <div class="conversations-sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Messages</h2>
            </div>
            <div class="conversations-list" id="conversations-list">
                <div id="conv-loading-state" style="padding:30px 20px;text-align:center;color:#707070;">
                    <div style="display:inline-block;width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#3665f3;border-radius:50%;animation:conv-spin 1s linear infinite;margin-bottom:12px;"></div>
                    <div style="font-size:14px;">Loading conversations...</div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <div class="empty-text">Select a conversation to start chatting</div>
            </div>
        </div>
    </main>

    <script type="module" src="js/messages.js"></script>
    <script src="js/messages-init.js"></script>
    <script type="module" src="js/site-notice.js"></script>
    <script src="js/bottom-nav.js" data-active="profile"></script>
<script type="module" src="/js/session-timeout.js"></script>
</body>
</html>
