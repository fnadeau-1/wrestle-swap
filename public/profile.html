<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-content">
            <div>
                <span id="user-menu-wrapper">
                    <button class="top-bar-btn" id="user-greeting" onclick="window.location.href='index.html'">Home</button>
                </span>
                <button class="top-bar-btn" onclick="window.location.href='help.html'">Help & Contact</button>
                <button class="top-bar-btn" onclick="window.location.href='chat.html'">Chats</button>
            </div>
            <div>
                <button class="top-bar-btn" onclick="window.location.href='sell.html'">Sell</button>
                <button class="top-bar-btn" onclick="window.location.href='settings.html'">Settings</button>
            </div>
        </div>
    </div>

    <!-- Main Header -->
    <div class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo" aria-label="GrappleTrade home"></a>
        </div>
    </div>

    <!-- Mobile Quick Links (hidden on desktop) -->
    <div class="mobile-quick-links">
        <a href="messages.html" class="mobile-quick-link">
            <span class="mql-icon">💬</span>
            <span>Chats</span>
        </a>
        <a href="help.html" class="mobile-quick-link">
            <span class="mql-icon">❓</span>
            <span>Help</span>
        </a>
        <a href="settings.html" class="mobile-quick-link">
            <span class="mql-icon">⚙️</span>
            <span>Settings</span>
        </a>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #707070;">Loading profile...</p>
    </div>

    <!-- Main Container -->
    <div class="container" id="profileContainer" style="display: none;">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-image" id="profile-image">
                👤
            </div>

            <div class="profile-info">
                <h1 class="profile-name" id="profile-name">Loading...</h1>
                <p class="profile-username" id="profile-username">@loading</p>

                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-number" id="items-sold">0</div>
                        <div class="stat-label">Items Sold</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="active-listings">0</div>
                        <div class="stat-label">Active Listings</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="total-reviews">0</div>
                        <div class="stat-label">Reviews</div>
                    </div>
                </div>

                <div class="rating-container" id="rating-container" style="display: none;">
                    <div class="stars" id="rating-stars">★★★★★</div>
                    <span class="rating-text" id="rating-value">0.0</span>
                    <span class="rating-count" id="rating-count">(0 reviews)</span>
                </div>

                <p class="profile-bio" id="profile-bio">
                    No bio available
                </p>

                <div class="profile-badges" id="profile-badges">
                    <!-- Badges will be added dynamically -->
                </div>

                <div class="action-buttons" id="action-buttons">
                    <!-- Buttons will be inserted here by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Currently Selling Section -->
        <div class="section">
            <h2 class="section-title">🛍️ Currently Selling</h2>
            <div class="items-grid" id="selling-items">
                <!-- Items will be loaded dynamically -->
            </div>
            <div class="empty-state" id="empty-selling" style="display: none;">
                <div class="empty-icon">📦</div>
                <p>No active listings</p>
            </div>
        </div>

        <!-- Reviews Section -->
        <div class="section" id="reviews-section">
            <h2 class="section-title">⭐ Reviews</h2>
            <div class="reviews-list" id="reviews-list">
                <!-- Reviews will be loaded dynamically -->
            </div>
            <div class="empty-state" id="empty-reviews" style="display: none;">
                <div class="empty-icon">⭐</div>
                <p>No reviews yet</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, addDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrNzOA__bI6zA2PvTFTujmFiBLsCe1iBk",
            authDomain: "wrestleswap.firebaseapp.com",
            projectId: "wrestleswap",
            storageBucket: "wrestleswap.firebasestorage.app",
            messagingSenderId: "857051782398",
            appId: "1:857051782398:web:bb4ab3f98e8dbbc8cad9af",
            measurementId: "G-B411WXLF3J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Get userId from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const profileUserId = urlParams.get('user');

        let currentUser = null;
        let isOwnProfile = false;

        // Load profile data
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;

            if (!user && !profileUserId) {
                window.location.href = 'sign-in.html';
                return;
            }

            const targetUserId = profileUserId || (user ? user.uid : null);
            isOwnProfile = user && (!profileUserId || profileUserId === user.uid);

            if (!targetUserId) {
                document.getElementById('loadingState').innerHTML = '<p>User not found</p>';
                return;
            }

            await loadUserProfile(targetUserId);
        });

        async function loadUserProfile(userId) {
            try {
                // Load user data from Firestore users collection
                const userDocSnap = await getDoc(doc(db, 'users', userId));
                const userData = userDocSnap.exists() ? userDocSnap.data() : {};

                // Determine display name: own profile uses Auth data, others use Firestore
                let displayName, username, bio, photoURL;
                if (isOwnProfile && currentUser) {
                    displayName = currentUser.displayName || currentUser.email?.split('@')[0] || 'User';
                    username = userData.username || currentUser.email?.split('@')[0] || 'user';
                    bio = userData.bio || '';
                    photoURL = currentUser.photoURL || null;
                } else {
                    displayName = userData.displayName || userData.username || 'GrappleTrade User';
                    username = userData.username || userId.substring(0, 8);
                    bio = userData.bio || '';
                    photoURL = userData.photoURL || null;
                }

                // Load active products
                const productsSnap = await getDocs(
                    query(collection(db, 'products'), where('userId', '==', userId), where('active', '==', true))
                );
                const soldSnap = await getDocs(
                    query(collection(db, 'products'), where('userId', '==', userId), where('sold', '==', true))
                );
                const activeProducts = productsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => !p.sold);

                // Load reviews from sellerRatings collection
                const ratingsSnap = await getDocs(
                    query(collection(db, 'sellerRatings'), where('sellerId', '==', userId))
                );
                const reviews = ratingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                const totalReviews = reviews.length;
                const averageRating = totalReviews > 0
                    ? reviews.reduce((sum, r) => sum + (r.rating || 0), 0) / totalReviews
                    : 0;

                document.getElementById('profile-name').textContent = displayName;
                document.getElementById('profile-username').textContent = '@' + username;
                document.getElementById('profile-bio').textContent = bio || 'No bio yet.';

                if (photoURL) {
                    const imgEl = document.createElement('img');
                    imgEl.src = photoURL;
                    imgEl.className = 'profile-image';
                    imgEl.style.cssText = 'width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid #c41e3a;';
                    document.getElementById('profile-image').replaceWith(imgEl);
                }

                document.getElementById('items-sold').textContent = soldSnap.size;
                document.getElementById('active-listings').textContent = activeProducts.length;
                document.getElementById('total-reviews').textContent = totalReviews;

                if (totalReviews > 0) {
                    document.getElementById('rating-container').style.display = 'flex';
                    document.getElementById('rating-value').textContent = averageRating.toFixed(1);
                    document.getElementById('rating-count').textContent = `(${totalReviews} review${totalReviews !== 1 ? 's' : ''})`;
                    const fullStars = Math.floor(averageRating);
                    const hasHalf = averageRating % 1 >= 0.5;
                    document.getElementById('rating-stars').textContent =
                        '★'.repeat(fullStars) + (hasHalf ? '☆' : '') + '☆'.repeat(5 - fullStars - (hasHalf ? 1 : 0));
                }

                const badgesContainer = document.getElementById('profile-badges');
                badgesContainer.innerHTML = '';
                if (totalReviews >= 10 && averageRating >= 4.5) {
                    badgesContainer.innerHTML += '<span class="badge verified">✓ Verified Seller</span>';
                }
                if (soldSnap.size >= 20) {
                    badgesContainer.innerHTML += '<span class="badge trusted">🛡️ Trusted Trader</span>';
                }
                const memberSince = userData.createdAt
                    ? new Date(userData.createdAt.toDate ? userData.createdAt.toDate() : userData.createdAt).getFullYear()
                    : new Date().getFullYear();
                badgesContainer.innerHTML += `<span class="badge member-since">📅 Member since ${memberSince}</span>`;

                const actionButtons = document.getElementById('action-buttons');
                if (isOwnProfile) {
                    actionButtons.innerHTML = `
                        <a href="listings-manager.html" class="btn btn-primary">My Listings</a>
                        <a href="my-orders.html" class="btn btn-primary">My Orders</a>
                        <a href="sell.html" class="btn btn-secondary">Add Listing</a>
                    `;
                } else {
                    actionButtons.innerHTML = `
                        <button class="btn btn-primary" id="contact-seller-btn" onclick="contactSeller('${userId}', '${displayName.replace(/'/g, "\\'")}')">💬 Message Seller</button>
                    `;
                }

                displayProducts(activeProducts);
                displayReviews(reviews, userId);

                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('profileContainer').style.display = 'block';

            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('loadingState').innerHTML = '<p>Error loading profile: ' + error.message + '</p>';
            }
        }

        async function contactSeller(sellerId, sellerName) {
            if (!currentUser) {
                window.location.href = 'sign-in.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }
            const btn = document.getElementById('contact-seller-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Opening chat...'; }
            try {
                // Use a stable conversation ID for general (non-product) messages
                const conversationId = `general_${currentUser.uid}_${sellerId}`;
                const convRef = doc(db, 'conversations', conversationId);
                await setDoc(convRef, {
                    productId: null,
                    productName: 'General Inquiry',
                    buyerId: currentUser.uid,
                    buyerName: currentUser.displayName || currentUser.email?.split('@')[0] || 'Buyer',
                    sellerId,
                    sellerName,
                    participants: [currentUser.uid, sellerId],
                    lastMessageAt: serverTimestamp(),
                    lastMessage: null,
                    unreadBuyer: 0,
                    unreadSeller: 0,
                }, { merge: true });
                window.location.href = `messages.html?conv=${conversationId}`;
            } catch (err) {
                console.error('contactSeller error:', err);
                if (btn) { btn.disabled = false; btn.textContent = '💬 Message Seller'; }
                alert('Failed to open chat. Please try again.');
            }
        }

        function displayProfile(userId, stats) {
            // Legacy stub — profile rendering is now done inside loadUserProfile
            void userId; void stats;

            if (photoURL) {
                const imgElement = document.createElement('img');
                imgElement.src = photoURL;
                imgElement.className = 'profile-image';
                document.getElementById('profile-image').replaceWith(imgElement);
            }

            document.getElementById('items-sold').textContent = stats.itemsSold;
            document.getElementById('active-listings').textContent = stats.activeListings;
            document.getElementById('total-reviews').textContent = stats.totalReviews;

            if (stats.totalReviews > 0) {
                document.getElementById('rating-container').style.display = 'flex';
                document.getElementById('rating-value').textContent = stats.averageRating.toFixed(1);
                document.getElementById('rating-count').textContent = `(${stats.totalReviews} review${stats.totalReviews !== 1 ? 's' : ''})`;

                const fullStars = Math.floor(stats.averageRating);
                const hasHalfStar = stats.averageRating % 1 >= 0.5;
                let starsHTML = '★'.repeat(fullStars);
                if (hasHalfStar) starsHTML += '☆';
                starsHTML += '☆'.repeat(5 - fullStars - (hasHalfStar ? 1 : 0));
                document.getElementById('rating-stars').textContent = starsHTML;
            }

            const badgesContainer = document.getElementById('profile-badges');
            badgesContainer.innerHTML = '';

            if (stats.totalReviews >= 10 && stats.averageRating >= 4.5) {
                badgesContainer.innerHTML += '<span class="badge verified">✓ Verified Seller</span>';
            }
            if (stats.itemsSold >= 20) {
                badgesContainer.innerHTML += '<span class="badge trusted">🛡️ Trusted Trader</span>';
            }
            badgesContainer.innerHTML += '<span class="badge member-since">📅 Member since 2024</span>';

            const actionButtons = document.getElementById('action-buttons');
            if (isOwnProfile) {
                actionButtons.innerHTML = `
                    <a href="listings-manager.html" class="btn btn-primary">View My Listings</a>
                    <a href="my-orders.html" class="btn btn-primary">View My orders</a>
                    <a href="sell.html" class="btn btn-secondary">Add New Listing</a>
                `;
            } else {
                actionButtons.innerHTML = `
                    <button class="btn btn-primary" onclick="alert('Contact seller feature coming soon!')">📧 Contact Seller</button>
                `;
            }
        }

        function displayProducts(products) {
            const container = document.getElementById('selling-items');
            const emptyState = document.getElementById('empty-selling');

            if (products.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = products.map(product => {
                const imageHTML = product.images && product.images.length > 0
                    ? `<img src="${product.images[0]}" alt="${product.title}">`
                    : '<div class="item-image">📦</div>';

                return `
                    <div class="item-card" onclick="window.location.href='productdetail.html?id=${product.id}'">
                        <div class="item-image">${imageHTML}</div>
                        <div class="item-details">
                            <div class="item-name">${product.title || 'Untitled'}</div>
                            <div class="item-price">$${parseFloat(product.price || 0).toFixed(2)}</div>
                            <span class="item-condition">${product.condition || 'New'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function displayReviews(reviews) {
            const container = document.getElementById('reviews-list');
            const emptyState = document.getElementById('empty-reviews');

            if (reviews.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'flex';
            emptyState.style.display = 'none';

            // Sort newest first — handle Firestore Timestamp or plain number
            reviews.sort((a, b) => {
                const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt || 0);
                const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt || 0);
                return tb - ta;
            });

            container.innerHTML = reviews.map(review => {
                const ts = review.createdAt?.toMillis ? review.createdAt.toMillis() : (review.createdAt || null);
                const reviewDate = ts ? formatRelativeTime(ts) : 'Recently';
                const stars = '★'.repeat(review.rating || 0) + '☆'.repeat(5 - (review.rating || 0));
                const initial = (review.buyerName || 'A')[0].toUpperCase();

                return `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="reviewer-avatar">${initial}</div>
                                <div>
                                    <div class="reviewer-name">${review.buyerName || 'Anonymous'}</div>
                                    <div class="review-date">${reviewDate}</div>
                                </div>
                            </div>
                            <div class="review-stars">${stars}</div>
                        </div>
                        ${review.text ? `<p class="review-text">${review.text}</p>` : ''}
                        ${review.productName ? `<p class="review-product">Product: ${review.productName}</p>` : ''}
                    </div>
                `;
            }).join('');
        }

        function formatRelativeTime(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);

            if (seconds < 60) return 'Just now';
            if (minutes < 60) return `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
            if (hours < 24) return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
            if (days < 7) return `${days} day${days !== 1 ? 's' : ''} ago`;
            if (weeks < 4) return `${weeks} week${weeks !== 1 ? 's' : ''} ago`;
            if (months < 12) return `${months} month${months !== 1 ? 's' : ''} ago`;
            return new Date(timestamp).toLocaleDateString();
        }
    </script>
    <script type="module" src="js/site-notice.js"></script>
    <script type="module" src="js/notifications.js"></script>
    <script src="js/bottom-nav.js" data-active="profile"></script>
</body>
</html>
