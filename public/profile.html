<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/profile.css">
    <script src="https://browser.sentry-cdn.com/8.38.0/bundle.min.js" integrity="sha256-facu3sz9OFAZ/KdtbGpCVb8abQC5VZJ4eSQSY0BGfW4=" crossorigin="anonymous"></script>
    <script src="js/sentry-init.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div>
                <span id="user-menu-wrapper">
                    <button class="top-bar-btn" id="user-greeting" data-href="sign-in.html">Hi! Sign in</button>
                </span>
                <button class="top-bar-btn" data-href="help.html">Help & Contact</button>
                <button class="top-bar-btn" data-href="messages.html">Chats</button>
            </div>
            <div>
                <button class="top-bar-btn" data-href="sell.html">Sell</button>
                <button class="top-bar-btn" data-href="settings.html">Settings</button>
            </div>
        </div>
    </div>

    <div class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo" aria-label="GrappleTrade home"></a>
        </div>
    </div>

    <div class="mobile-quick-links">
        <a href="messages.html" class="mobile-quick-link">
            <span class="mql-icon">💬</span>
            <span>Chats</span>
        </a>
        <a href="help.html" class="mobile-quick-link">
            <span class="mql-icon">❓</span>
            <span>Help</span>
        </a>
        <a href="settings.html" class="mobile-quick-link">
            <span class="mql-icon">⚙️</span>
            <span>Settings</span>
        </a>
    </div>

    <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #707070;">Loading profile...</p>
    </div>

    <main class="container" id="profileContainer" style="display: none;">
        <div class="profile-header">
            <div class="profile-image" id="profile-image">
                👤
            </div>

            <div class="profile-info">
                <h1 class="profile-name" id="profile-name">Loading...</h1>
                <p class="profile-username" id="profile-username">@loading</p>

                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-number" id="items-sold">0</div>
                        <div class="stat-label">Items Sold</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="active-listings">0</div>
                        <div class="stat-label">Active Listings</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="total-reviews">0</div>
                        <div class="stat-label">Reviews</div>
                    </div>
                </div>

                <div class="rating-container" id="rating-container" style="display: none;">
                    <div class="stars" id="rating-stars">★★★★★</div>
                    <span class="rating-text" id="rating-value">0.0</span>
                    <span class="rating-count" id="rating-count">(0 reviews)</span>
                </div>

                <p class="profile-bio" id="profile-bio">
                    No bio available
                </p>

                <div class="profile-badges" id="profile-badges">
                </div>

                <div class="action-buttons" id="action-buttons">
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">🛍️ Currently Selling</h2>
            <div class="items-grid" id="selling-items">
            </div>
            <div class="empty-state" id="empty-selling" style="display: none;">
                <div class="empty-icon">📦</div>
                <p>No active listings</p>
            </div>
        </div>

        <div class="section" id="reviews-section">
            <h2 class="section-title">⭐ Reviews</h2>
            <div class="reviews-list" id="reviews-list">
            </div>
            <div class="empty-state" id="empty-reviews" style="display: none;">
                <div class="empty-icon">⭐</div>
                <p>No reviews yet</p>
            </div>
        </div>
    </main>

    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/site-notice.js"></script>
    <script type="module" src="js/notifications.js"></script>
    <script src="js/bottom-nav.js" data-active="profile"></script>
</body>
</html>
