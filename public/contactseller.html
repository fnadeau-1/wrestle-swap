<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/contactseller.css">
</head>
<body>
    <div class="loading">Loading messaging system...</div>
    <iframe src="http://localhost:3000/messages" id="chatFrame"></iframe>
    
    <script>
        // Hide loading message when iframe loads
        document.getElementById('chatFrame').onload = function() {
            document.querySelector('.loading').style.display = 'none';
        };
        
        // When deployed to production, use relative path
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            document.getElementById('chatFrame').src = 'https://your-app-name.web.app/messages';
        }
    </script>
    <script type="module" src="js/site-notice.js"></script>
</body>
</html>
