<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GrappleTrade</title>
    <link rel="stylesheet" href="css/base.css">
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LcM51YsAAAAAJIK9J6ztDQhKET0FdHvOBZ9p9Ah" async defer></script>
    <style>
        body {
            background: url('https://nwhof.org/img/fb4b203a-6847-4772-914c-e01723e9f4ec/FI_vB7YVcAAjuMb.jpg?fm=jpg&q=80&fit=max&crop=743%2C418%2C52%2C0') center center / cover no-repeat fixed;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .auth-container {
            position: relative;
            z-index: 1;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #c41e3a;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 15px;
            color: #707070;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 24px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .social-btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            position: relative;
        }

        .social-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-google {
            background: white;
            color: #3c4043;
            border: 1.5px solid #dadce0;
        }

        .btn-google:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: #bbb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }


.btn-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .terms-note {
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }

        .terms-note a {
            color: #3665f3;
            text-decoration: none;
        }

        .terms-note a:hover {
            text-decoration: underline;
        }

        .error-banner {
            background: #fdecea;
            color: #c62828;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">GrappleTrade</div>
        <div class="tagline">Buy and sell quality wrestling gear</div>

        <div class="section-title">Sign in or create an account</div>

        <div class="error-banner" id="error-banner"></div>

        <div class="social-buttons">
            <!-- Google -->
            <button class="social-btn btn-google" id="btn-google" onclick="socialLogin()">
                <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

        </div>

        <div class="terms-note">
            By continuing, you agree to GrappleTrade's
            <a href="legal/terms-of-service.html">Terms of Service</a>
            and <a href="legal/privacy-policy.html">Privacy Policy</a>.
            New accounts are created automatically on first sign-in.
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrNzOA__bI6zA2PvTFTujmFiBLsCe1iBk",
            authDomain: "wrestleswap.firebaseapp.com",
            projectId: "wrestleswap",
            storageBucket: "wrestleswap.firebasestorage.app",
            messagingSenderId: "857051782398",
            appId: "1:857051782398:web:bb4ab3f98e8dbbc8cad9af",
            measurementId: "G-B411WXLF3J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.signInWithPopup = signInWithPopup;
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.firestoreDoc = doc;
        window.firestoreSetDoc = setDoc;
        window.firestoreGetDoc = getDoc;
    </script>

    <script>
        let popupInProgress = false;

        const RECAPTCHA_SITE_KEY = '6LcM51YsAAAAAJIK9J6ztDQhKET0FdHvOBZ9p9Ah';
        const RECAPTCHA_VERIFY_URL = 'https://us-central1-wrestleswap.cloudfunctions.net/verifyRecaptcha';

        function showError(msg) {
            const el = document.getElementById('error-banner');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-banner').style.display = 'none';
        }

        function setAllButtonsDisabled(disabled) {
            document.getElementById('btn-google').disabled = disabled;
        }

        function getPostLoginRedirect() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect && !redirect.includes('://')) return redirect;
            return 'index.html';
        }

        async function executeRecaptcha(action) {
            await new Promise(resolve => grecaptcha.enterprise.ready(resolve));
            return await grecaptcha.enterprise.execute(RECAPTCHA_SITE_KEY, { action });
        }

        async function verifyRecaptchaServer(action) {
            try {
                const token = await executeRecaptcha(action);
                const response = await fetch(RECAPTCHA_VERIFY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, expectedAction: action })
                });
                const result = await response.json();
                return result.success;
            } catch (error) {
                console.error('reCAPTCHA error:', error);
                return false;
            }
        }

        function generateUsername() {
            const randomNum = Math.floor(10000 + Math.random() * 90000);
            return `wrestler_${randomNum}`;
        }

        async function isUsernameUnique(username) {
            try {
                const snap = await window.firestoreGetDoc(window.firestoreDoc(window.firebaseDb, 'usernames', username));
                return !snap.exists();
            } catch {
                return false;
            }
        }

        async function generateUniqueUsername() {
            for (let i = 0; i < 10; i++) {
                const username = generateUsername();
                if (await isUsernameUnique(username)) return username;
            }
            return `wrestler_${Date.now()}`;
        }

        async function ensureUserProfile(user) {
            const userRef = window.firestoreDoc(window.firebaseDb, 'users', user.uid);
            const snap = await window.firestoreGetDoc(userRef);
            if (snap.exists()) return; // existing user, nothing to do

            // New user — create profile
            const username = await generateUniqueUsername();
            const userData = {
                uid: user.uid,
                email: user.email || '',
                displayName: user.displayName || '',
                username: username,
                photoURL: user.photoURL || '',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            await window.firestoreSetDoc(userRef, userData);
            await window.firestoreSetDoc(
                window.firestoreDoc(window.firebaseDb, 'usernames', username),
                { userId: user.uid, createdAt: new Date().toISOString() }
            );
        }

        async function socialLogin() {
            if (popupInProgress) return;
            hideError();
            popupInProgress = true;
            setAllButtonsDisabled(true);

            try {
                await verifyRecaptchaServer('SOCIAL_SIGN_IN');

                const authProvider = new window.GoogleAuthProvider();

                const result = await window.signInWithPopup(window.firebaseAuth, authProvider);
                await ensureUserProfile(result.user);
                window.location.href = getPostLoginRedirect();
            } catch (error) {
                const ignored = ['auth/cancelled-popup-request', 'auth/popup-closed-by-user'];
                if (!ignored.includes(error.code)) {
                    showError(error.message || 'Sign in failed. Please try again.');
                }
                console.error(error);
            } finally {
                setAllButtonsDisabled(false);
                popupInProgress = false;
            }
        }
    </script>
    <script type="module" src="js/site-notice.js"></script>
</body>
</html>
