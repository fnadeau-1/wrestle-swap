<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sign-in.css">
    <script src="https://browser.sentry-cdn.com/8.38.0/bundle.min.js" integrity="sha256-facu3sz9OFAZ/KdtbGpCVb8abQC5VZJ4eSQSY0BGfW4=" crossorigin="anonymous"></script>
    <script src="js/sentry-init.js"></script>
    <script src="js/event-dispatch.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="logo">GrappleTrade</div>
        <div class="tagline">Buy and sell quality wrestling gear</div>

        <div class="section-title">Sign in or create an account</div>

        <div class="error-banner" id="error-banner" role="alert" aria-live="polite"></div>

        <div class="social-buttons">
            <button class="social-btn btn-google" id="btn-google" data-onclick="socialLogin">
                <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>

        </div>

        <div class="terms-note">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;text-align:left;">
                <input type="checkbox" id="age-confirm" style="margin-top:3px;flex-shrink:0;" data-onchange="onAgeCheckChange">
                <span>I confirm I am 18 years of age or older. GrappleTrade is not intended for users under 18.</span>
            </label>
        </div>
        <div class="terms-note">
            By continuing, you agree to GrappleTrade's
            <a href="legal/terms-of-service.html">Terms of Service</a>
            and <a href="legal/privacy-policy.html">Privacy Policy</a>.
            New accounts are created automatically on first sign-in.
        </div>
    </div>

    <script type="module" src="js/sign-in.js"></script>
    <script src="js/sign-in-init.js"></script>
    <script type="module" src="js/site-notice.js"></script>
</body>
</html>
