<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | GrappleTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="css/checkout.css">
    <script src="https://browser.sentry-cdn.com/8.38.0/bundle.min.js" integrity="sha256-facu3sz9OFAZ/KdtbGpCVb8abQC5VZJ4eSQSY0BGfW4=" crossorigin="anonymous"></script>
    <script src="js/sentry-init.js"></script>
    <script src="js/event-dispatch.js"></script>
</head>
<body>
    <div id="auth-notice" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:12px; padding:35px 30px; max-width:380px; width:90%; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.2);">
            <div style="font-size:48px; margin-bottom:15px;">🔒</div>
            <h2 style="font-size:22px; color:#333; margin-bottom:10px;">Sign In Required</h2>
            <p style="font-size:14px; color:#707070; line-height:1.5;">You need to be signed in to complete a purchase. Redirecting you to sign in...</p>
        </div>
    </div>

    <div class="top-bar">
        <div class="top-bar-content">
            <a href="index.html" class="logo" aria-label="GrappleTrade home"></a>
            <div class="secure-badge">
                🔒 Secure Checkout
            </div>
        </div>
    </div>

    <main class="container" id="checkout-container">
    </main>

    <script type="module" src="js/checkout.js"></script>
    <script src="js/checkout-init.js"></script>
    <div id="payment-overlay">
        <div style="background:white;border-radius:14px;padding:44px 36px;max-width:420px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.35);">
            <div style="width:52px;height:52px;border:5px solid #e5e5e5;border-top-color:#c41e3a;border-radius:50%;animation:pay-spin 0.9s linear infinite;margin:0 auto 22px;"></div>
            <h3 id="overlay-title" style="font-size:20px;margin-bottom:10px;color:#1a1a1a;">Processing Payment</h3>
            <p id="overlay-message" style="color:#666;font-size:14px;line-height:1.6;margin:0;">Please do not close or navigate away from this page.</p>
        </div>
    </div>
<script type="module" src="/js/session-timeout.js"></script>
</body>
</html>
